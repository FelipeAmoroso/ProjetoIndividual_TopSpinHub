</head>

<body onload="listar()">
  <!--header inicio-->
  <div class="header">
    <div class="container">
      <div class="boxes">
        <div class="box">
          <a href="#">
            <img src="./assets/imgs/logo.png">
          </a>
        </div>
      </div>
      <div class="container_bt">
        <ul class="navbar">
          <li class="agora">
            <a href="index.html">Inicio</a>
          </li>
          <li>
            <a href="index.html">História</a>
          </li>
          <li>
            <a href="regras.html">Regras</a>
          </li>
          <li>
            <a href="quiz.html">Quiz</a>
          </li>
          <li>
            |
          </li>
          <li>
            <a href="login.html">Login</a>
          </li>
          <li>
            <a href="cadastro.html">Cadastro</a>
          </li>
        </ul>
      </div>
    </div>
  </div>
  <!--header fim-->

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Bem-vindo!</h2>
        <div class="formulario">
          <!--
                         Para inserir mais um campo, copie uma das inputs abaixo.
                         Assim que inserir vá para o script abaixo.
                     -->
          <div class="campo">
            <span>Nome:</span>
            <input id="nome_input" type="text" placeholder="Seu nome" />
          </div>
          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com" />
          </div>
          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******" />
          </div>
          <div class="campo">
            <span>Confirmação da Senha:</span>
            <input id="confirmacao_senha_input" type="password" placeholder="******" />
          </div>
          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <!--footer inicio-->
  <footer class="footer">
    <div class="footer-container">
      SITE DESENVOLVIDO POR: <br>

    </div>

      São Paulo Tech School
    </div>

    <!--footer fim-->
</body>

</html>

<script>


  function cadastrar() {

    // pegando os valores digitados nos inputs
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;

    // vetor com os valores
    var campos = [nomeVar, emailVar, senhaVar, confirmacaoSenhaVar];

    // se algum campo estiver vazio
    for (var i = 0; i < campos.length; i++) {

      if (campos[i] == "") {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "(Mensagem de erro para campos em branco)";
        return false;
      }
    }

    
    if (!emailVar.includes("@") || !emailVar.includes(".")) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "email inválido!";
      return false;
    }

   
    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "Insira as mesmas senhas";
      return false;
    }

    // sumir mensasgem de erro
    // executa apenas uma vez após 5 segundos
    setTimeout(sumirMensagem, 5000);

    // envio de dados para o servidor
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        if (resposta.ok) {

          // mostra mensagem de sucesso
          cardErro.style.display = "block";
          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso!";

          
          setTimeout(() => {
            window.location = "login.html";
          }, 2000);


          // limpa os campos do formulario
          nome_input.value = "";
          email_input.value = "";
          senha_input.value = "";
          confirmacao_senha_input.value = "";

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (erro) {
        console.log(erro);
      });
    return false;

    function sumirMensagem() {
      cardErro.style.display = "none";
    }
  }

</script>
