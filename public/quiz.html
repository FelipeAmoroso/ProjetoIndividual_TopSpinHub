<!DOCTYPE html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
    <title>Top Spin Hub | Quiz</title>
 
    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="./css/estilo.css">
</head>
 
<body onload="onloadEsconder()">
 
    <div class="header">
 
        <div class="container">
 
            <div class="boxes">
 
                <div class="box">
 
                    <a href="#">
                        <img src="./assets/imgs/logo.png" alt="Logo Top Spin Hub">
                    </a>
 
                </div>
 
            </div>
 
            <div class="container_bt">
 
                <ul class="navbar">
 
                    <li class="agora">
                        <a href="index.html">Inicio</a>
                    </li>
 
                    <li>
                        <a href="index.html">História</a>
                    </li>
 
                    <li>
                        <a href="regras.html">Regras</a>
                    </li>
 
                    <li>
                        <a href="quiz.html">Quiz</a>
                    </li>
 
                    <li>|</li>
 
                    <li>
                        <a href="login.html">Login</a>
                    </li>
 
                    <li>
                        <a href="cadastro.html">Cadastro</a>
                    </li>
 
                </ul>
 
            </div>
 
        </div>
 
    </div>
 
    <div id="pontuacaoEJogo">
 
        <button id="btnIniciarQuiz" onclick="iniciarQuiz()">
            INICIAR QUIZ
        </button>
 
        <div id="pontuacao">
 
            <div id="pontuacaoDuranteJogo">
                <span>
                    Quantidade de acertos:
                    <span id="spanCertas">0</span>
                </span>
 
                <span>
                    Quantidade de erros:
                    <span id="spanErradas">0</span>
                </span>
            </div>
 
            <div id="pontuacaoFinalJogo">
                <span id="pontuacaoFinal">
                    Pontuação Final:
                    <span id="spanPontuacaoFinal">0</span>
                </span>
 
                <span id="msgFinal"></span>
            </div>
 
        </div>
 
        <div id="jogo">
 
            <div id="infoQuestao">
                <span>
                    Questão atual:
                    <span id="spanNumeroDaQuestaoAtual"></span>
                    de
                    <span id="qtdQuestoes"></span>
                    questões.
                </span>
            </div>
 
            <div id="perguntaDaQuestaoAtual">
                <span id="spanQuestaoExibida"></span>
            </div>
 
            <div id="infoAlternativas">
                <span><em>Escolha uma opção:</em></span>
            </div>
 
            <div id="opcoes">
 
                <span>
                    <input type="radio" id="primeiraOpcao" name="option" value="alternativaA">
                    <label for="primeiraOpcao" id="labelOpcaoUm"></label>
                </span>
 
                <span>
                    <input type="radio" id="segundaOpcao" name="option" value="alternativaB">
                    <label for="segundaOpcao" id="labelOpcaoDois"></label>
                </span>
 
                <span>
                    <input type="radio" id="terceiraOpcao" name="option" value="alternativaC">
                    <label for="terceiraOpcao" id="labelOpcaoTres"></label>
                </span>
 
                <span>
                    <input type="radio" id="quartaOpcao" name="option" value="alternativaD">
                    <label for="quartaOpcao" id="labelOpcaoQuatro"></label>
                </span>
 
            </div>
 
            <div id="botoes">
 
                <button onclick="submeter()" id="btnSubmeter">
                    Submeter resposta
                </button>
 
                <button onclick="avancar()" id="btnProx" disabled>
                    Próxima questão
                </button>
 
                <button onclick="tentarNovamente()" id="btnTentarNovamente" disabled>
                    Tentar novamente
                </button>
 
            </div>
 
        </div>
 
    </div>
 
</body>
 
</html>
 
<script>
 
    const listaDeQuestoes = [
        {
            pergunta: "Qual país é considerado o berço do tênis de mesa?",
            alternativaA: "Brasil",
            alternativaB: "China",
            alternativaC: "Inglaterra",
            alternativaD: "Japão",
            alternativaCorreta: "alternativaC"
        },
        {
            pergunta: "Qual é o número mínimo de pontos para vencer um set no tênis de mesa?",
            alternativaA: "11 pontos",
            alternativaB: "15 pontos",
            alternativaC: "21 pontos",
            alternativaD: "10 pontos",
            alternativaCorreta: "alternativaA"
        },
        {
            pergunta: "Qual destes jogadores é um grande nome do tênis de mesa brasileiro?",
            alternativaA: "Neymar",
            alternativaB: "Oscar Schmidt",
            alternativaC: "Gustavo Kuerten",
            alternativaD: "Hugo Calderano",
            alternativaCorreta: "alternativaD"
        },
        {
            pergunta: "Como também é conhecido o tênis de mesa?",
            alternativaA: "Ping Pong",
            alternativaB: "Mini Tennis",
            alternativaC: "Fast Ball",
            alternativaD: "Table Ball",
            alternativaCorreta: "alternativaA"
        },
        {
            pergunta: "Qual país domina historicamente o tênis de mesa mundial?",
            alternativaA: "Argentina",
            alternativaB: "Alemanha",
            alternativaC: "China",
            alternativaD: "Canadá",
            alternativaCorreta: "alternativaC"
        },
        {
            pergunta: "Quantos centímetros no mínimo a bola tem que ser lançada na hora do saque?",
            alternativaA: "13cm",
            alternativaB: "14cm",
            alternativaC: "15cm",
            alternativaD: "16cm",
            alternativaCorreta: "alternativaD"
        },
        {
            pergunta: "Em competições oficiais, quantos sets são disputados em uma partida padrão?",
            alternativaA: "Melhor de 3",
            alternativaB: "Melhor de 5",
            alternativaC: "Melhor de 7",
            alternativaD: "Melhor de 9",
            alternativaCorreta: "alternativaC"
        },
        {
            pergunta: "Após quantos pontos o saque deve ser alternado entre os jogadores?",
            alternativaA: "A cada 1 ponto",
            alternativaB: "A cada 2 pontos",
            alternativaC: "A cada 3 pontos",
            alternativaD: "A cada 5 pontos",
            alternativaCorreta: "alternativaB"
        },
        {
            pergunta: "O que acontece quando o set chega a 10 a 10 (deuce) no tênis de mesa?",
            alternativaA: "O jogo acaba empatado",
            alternativaB: "Quem fizer o próximo ponto vence",
            alternativaC: "O jogador precisa abrir 2 pontos de vantagem para vencer",
            alternativaD: "Disputa-se um novo set",
            alternativaCorreta: "alternativaC"
        },
        {
            pergunta: "Qual entidade é responsável por organizar o tênis de mesa mundial?",
            alternativaA: "FIFA",
            alternativaB: "ITTF",
            alternativaC: "COB",
            alternativaD: "ATP",
            alternativaCorreta: "alternativaB"
        }
    ];
 
    let idTentativa = null;
    let numeroDaQuestaoAtual = 0;
    let pontuacaoFinal = 0;
    let certas = 0;
    let erradas = 0;
    let quantidadeDeQuestoes = listaDeQuestoes.length;
 
    function onloadEsconder() {
        pontuacao.style.display = "none";
        jogo.style.display = "none";
    }
 
    function iniciarQuiz() {
 
        fetch("/tentativas/criar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fkUsuario: sessionStorage.ID_USUARIO
            })
        })
            .then(res => res.json())
            .then(dados => {

                console.log("Resposta completa da API /tentativas/criar:", dados);
 
                idTentativa = dados.insertId
                    || dados.id
                    || dados.idTentativa
                    || (Array.isArray(dados) && dados[0] && (dados[0].insertId || dados[0].id))
                    || null;
 
                console.log("idTentativa setado:", idTentativa);
 
                if (!idTentativa) {
                    console.warn("ATENÇÃO: idTentativa ficou null! Verifique o retorno da API acima.");
                }
 
                iniciarInterfaceQuiz();
            })
            .catch(erro => {
                console.error("Erro ao criar tentativa:", erro);
            });
    }
 
    function iniciarInterfaceQuiz() {
        pontuacao.style.display = "flex";
        jogo.style.display = "flex";
        btnIniciarQuiz.style.display = "none";
 
        qtdQuestoes.innerHTML = quantidadeDeQuestoes;
 
        preencherHTMLcomQuestaoAtual(0);
 
        btnSubmeter.disabled = false;
        btnProx.disabled = true;
        btnTentarNovamente.disabled = true;
    }
 
    function preencherHTMLcomQuestaoAtual(index) {
        habilitarAlternativas(true);
 
        const q = listaDeQuestoes[index];
        numeroDaQuestaoAtual = index;
 
        spanNumeroDaQuestaoAtual.innerHTML = index + 1;
        spanQuestaoExibida.innerHTML = q.pergunta;
 
        labelOpcaoUm.innerHTML = q.alternativaA;
        labelOpcaoDois.innerHTML = q.alternativaB;
        labelOpcaoTres.innerHTML = q.alternativaC;
        labelOpcaoQuatro.innerHTML = q.alternativaD;
    }
 
    function submeter() {
        const options = document.getElementsByName("option");
        let marcada = false;
 
        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) marcada = true;
        }
 
        if (!marcada) {
            alert("Escolha uma alternativa!");
        } else {
            btnSubmeter.disabled = true;
            btnProx.disabled = false;
            habilitarAlternativas(false);
            checarResposta();
        }
    }
 
    function habilitarAlternativas(valor) {
        primeiraOpcao.disabled = !valor;
        segundaOpcao.disabled = !valor;
        terceiraOpcao.disabled = !valor;
        quartaOpcao.disabled = !valor;
    }
 
    function avancar() {
        btnProx.disabled = true;
        btnSubmeter.disabled = false;
 
        desmarcarRadioButtons();
        limparCores();
 
        if (numeroDaQuestaoAtual < quantidadeDeQuestoes) {
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual);
        } else {
            finalizarJogo();
        }
    }
 
    function tentarNovamente() {
        window.location.reload();
    }
 
    function checarResposta() {
        const q = listaDeQuestoes[numeroDaQuestaoAtual];
        const correta = q.alternativaCorreta;
 
        const options = document.getElementsByName("option");
 
        options.forEach(option => {
            if (option.checked && option.value == correta) {
                pontuacaoFinal++;
                certas++;
                spanCertas.innerHTML = certas;
            } else if (option.checked) {
                erradas++;
                spanErradas.innerHTML = erradas;
            }
        });
 
        numeroDaQuestaoAtual++;
    }
 
    function limparCores() { }
 
    function desmarcarRadioButtons() {
        const options = document.getElementsByName("option");
        options.forEach(o => o.checked = false);
    }
 
    function finalizarJogo() {
 
        console.log("ANTES DO FETCH /resultados/salvar:", {
            fkUsuario: sessionStorage.ID_USUARIO,
            fkTentativa: idTentativa,
            acertos: certas,
            erros: erradas
        });
 
        if (!idTentativa) {
            console.error("ERRO: idTentativa é null! A tentativa não foi criada corretamente.");
            alert("Erro: tentativa não foi criada. Verifique o console para mais detalhes.");
            return;
        }
 
        fetch("/resultados/salvar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                fkUsuario: sessionStorage.ID_USUARIO,
                fkTentativa: idTentativa,
                acertos: certas,
                erros: erradas
            })
        })
            .then(res => res.json())
            .then(dados => {
                console.log("Resultado salvo com sucesso:", dados);
            })
            .catch(erro => {
                console.error("Erro ao salvar resultado:", erro);
            });
 
        const porcentagem = pontuacaoFinal / quantidadeDeQuestoes;
 
        if (porcentagem <= 0.3) msgFinal.innerHTML = "Precisa melhorar!";
        else if (porcentagem < 0.9) msgFinal.innerHTML = "Bom desempenho!";
        else msgFinal.innerHTML = "Excelente!";
 
        spanPontuacaoFinal.innerHTML = pontuacaoFinal;
 
        btnTentarNovamente.disabled = false;
 
        setTimeout(() => {
            window.location.href = "dashboard/dashboard.html";
        }, 2000);
    }
 
</script>
