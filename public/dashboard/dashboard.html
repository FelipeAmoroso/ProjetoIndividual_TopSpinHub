<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <title>Top Spin Hub | Dashboard</title>

  <link rel="stylesheet" href="../css/estilo.css">
  <link rel="stylesheet" href="../css/dashboards.css">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="container">

      <div class="boxes">
        <div class="box">
          <a href="../index.html">
            <img src="../assets/imgs/logo.png">
          </a>
        </div>
      </div>

      <div class="container_bt">
        <ul class="navbar">
          <li><a href="../index.html">Inicio</a></li>
          <li><a href="../quiz.html">Quiz</a></li>
          <li>|</li>
          <li class="agora"><a href="#">Dashboard</a></li>
          <li><a href="../login.html" onclick="limparSessao()">Sair</a></li>
        </ul>
      </div>

    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dashboard">

    <h2>Olá, <span id="b_usuario"></span> </h2>

    <!-- INDICADORES -->
    <div class="indicadores">

      <div class="card">
        <h4>Acertos</h4>
        <p id="acertos">0</p>
      </div>

      <div class="card">
        <h4>Erros</h4>
        <p id="erros">0</p>
      </div>

      <div class="card">
        <h4>% Acerto</h4>
        <p id="porcentagem">0%</p>
      </div>

    </div>

    <!-- INFO EXTRA -->
    <div class="extras">
      <p id="nivel"></p>
      <p id="mensagem"></p>
    </div>

    <!-- GRÁFICO -->
    <div class="grafico">
      <canvas id="graficoQuiz" width="350" height="350"></canvas>
    </div>

  </div>

</body>

</html>

<script>

  document.getElementById("b_usuario").innerHTML =
    sessionStorage.NOME_USUARIO || "Usuário";

  window.onload = carregarDashboard();

  function carregarDashboard() {

    var acertos = Number(sessionStorage.ACERTOS) || 7;
    var erros = Number(sessionStorage.ERROS) || 3;

    var total = acertos + erros;
    var porcentagem = total > 0 ? ((acertos / total) * 100).toFixed(1) : 0;

    // indicadores
    acertos = Number(acertos);
    erros = Number(erros);

    document.getElementById("acertos").innerHTML = acertos;
    document.getElementById("erros").innerHTML = erros;
    document.getElementById("porcentagem").innerHTML = porcentagem + "%";

    // nível
    var nivel = "";
    if (porcentagem >= 80) nivel = " Nível: Avançado";
    else if (porcentagem >= 50) nivel = " Nível: Intermediário";
    else nivel = " Nível: Iniciante";

    document.getElementById("nivel").innerHTML = nivel;

    // mensagem
    var msg = "";
    if (porcentagem >= 80) msg = "Mandou muito bem!";
    else if (porcentagem >= 50) msg = "Bom desempenho!";
    else msg = "Vale revisar o conteúdo!";

    document.getElementById("mensagem").innerHTML = msg;

    // gráfico
    new Chart(document.getElementById('graficoQuiz'), {
      type: 'doughnut',
      data: {
        labels: ['Acertos', 'Erros'],
        datasets: [{
          data: [acertos, erros],
          backgroundColor: ['#0a1f44', '#e3b062']
        }]
      },
      options: {
        responsive: false
      }
    });
  }

  function limparSessao() {
    sessionStorage.clear();
  }

</script>
