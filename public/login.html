  <div class="header">

    <div class="container">

      <div class="boxes">
        <div class="box">
          <a href="index.html">
            <img src="./assets/imgs/logo.png">
          </a>
        </div>
      </div>

      <div class="container_bt">

        <ul class="navbar">

          <li>
            <a href="index.html">Inicio</a>
          </li>

          <li>
            <a href="index.html#historia">História</a>
          </li>

          <li>
            <a href="regras.html">Regras</a>

          </li>

          <li>

          </li>

        </ul>

      </div>

    </div>

  <div class="login">

    <div class="alerta_erro">

      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>

    </div>

    <div class="container">

      <div class="card card-login">

        <h2>Olá de volta!</h2>

        <div class="formulario">

          <div class="campo">
            <span>E-mail:</span>

            <input id="email_input" type="text" placeholder="meuemail@provedor.com">
          </div>

          <div class="campo">
            <span>Senha:</span>

            <input id="senha_input" type="password" placeholder="******">
          </div>

          <button class="botao" onclick="entrar()">
            Entrar
          </button>

        </div>

        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif">
        </div>

        <div id="div_erros_login"></div>

      </div>

    </div>

      São Paulo Tech School
    </div>

  </footer>

</html>

<script>

  function entrar() {

    // aguardar();

    // pegando os valores digitados nos inputs
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;

    // vetor com os valores
    var vt_campos = [emailVar, senhaVar];

    // se algum campo estiver vazio
    for (var i = 0; i < vt_campos.length; i++) {

      if (vt_campos[i] == "") {

        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "Preencha todos os campos!";
        return false;
      }
    }

    // validação de email
    if (!emailVar.includes("@") || !emailVar.includes(".")) {

      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "E-mail inválido!";
      return false;
    }

    // esconde a mensagem depois de 5 segundos
    setTimeout(sumirMensagem, 5000);

    console.log("FORM LOGIN: ", emailVar);
    console.log("FORM SENHA: ", senhaVar);

    // requisição para o servidor
    fetch("/usuarios/autenticar", {

      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({

        emailServer: emailVar,
        senhaServer: senhaVar

      })

    })

      .then(function (resposta) {

        console.log("ESTOU NO THEN DO entrar()!");

        if (resposta.ok) {

          console.log(resposta);

          resposta.json().then(json => {

            console.log(json);
            console.log(JSON.stringify(json));

            // salvando os dados do usuário
            sessionStorage.EMAIL_USUARIO = json.email;
            sessionStorage.NOME_USUARIO = json.nome;
            sessionStorage.ID_USUARIO = json.id;

            // redireciona para dashboard
            setTimeout(function () {

              window.location = "./dashboard/cards.html";

            }, 1000);

          });

        } else {

          console.log("Houve um erro ao tentar realizar o login!");

          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "E-mail ou senha inválidos!";

          resposta.text().then(texto => {

            console.error(texto);
          });
        }

      })

      .catch(function (erro) {

        console.log(erro);
      });

    return false;

    function sumirMensagem() {

      cardErro.style.display = "none";
    }
  }

</script>
