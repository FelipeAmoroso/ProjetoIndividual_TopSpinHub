<!DOCTYPE html>
<html lang="pt-br">

<head>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Top Spin Hub | Login</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css">

</head>

<body>

  <div class="header">

    <div class="container">

      <div class="boxes">
        <div class="box">
          <a href="index.html">
            <img src="./assets/imgs/logo.png">
          </a>
        </div>
      </div>

      <div class="container_bt">

        <ul class="navbar">

          <li><a href="index.html">Inicio</a></li>
          <li><a href="index.html#historia">História</a></li>
          <li><a href="regras.html">Regras</a></li>
          <li><a href="quiz.html">Quiz</a></li>

          <li>|</li>

          <li class="agora"><a href="login.html">Login</a></li>
          <li><a href="cadastro.html">Cadastro</a></li>

        </ul>

      </div>

    </div>

  </div>

  <div class="login">

    <div class="alerta_erro">
      <div class="card_erro" id="cardErro" style="display:none;">
        <span id="mensagem_erro"></span>
      </div>
    </div>

    <div class="container">

      <div class="card card-login">

        <h2>Olá de volta!</h2>

        <div class="formulario">

          <div class="campo">
            <span>E-mail:</span>
            <input id="email_input" type="text" placeholder="meuemail@provedor.com">
          </div>

          <div class="campo">
            <span>Senha:</span>
            <input id="senha_input" type="password" placeholder="******">
          </div>

          <button class="botao" onclick="entrar()">
            Entrar
          </button>

        </div>

        <div id="div_aguardar" class="loading-div" style="display:none;">
          <img src="./assets/circle-loading.gif">
        </div>

      </div>

    </div>

  </div>

  <footer class="footer">

    <div class="footer-container">
      SITE DESENVOLVIDO POR: <br>
      Felipe Amoroso Lambaz
    </div>

    <div class="footer-container">
      INSTITUIÇÃO: <br>
      São Paulo Tech School
    </div>

  </footer>

</body>

</html>

<script>

function entrar() {

  var emailVar = email_input.value;
  var senhaVar = senha_input.value;

  // validação
  if (!emailVar || !senhaVar) {
    mostrarErro("Preencha todos os campos!");
    return;
  }

  if (!emailVar.includes("@") || !emailVar.includes(".")) {
    mostrarErro("E-mail inválido!");
    return;
  }

  // loading
  div_aguardar.style.display = "block";

  fetch("/usuarios/autenticar", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      emailServer: emailVar,
      senhaServer: senhaVar
    })
  })

  .then(function (resposta) {

    if (resposta.ok) {
      return resposta.json();
    } else {
      throw "Erro no login";
    }

  })

  .then(function (json) {

    console.log("Usuário logado:", json);

    // sessão
    sessionStorage.EMAIL_USUARIO = json.email;
    sessionStorage.NOME_USUARIO = json.nome;
    sessionStorage.ID_USUARIO = json.id;

    // redirecionamento
    setTimeout(function () {
      window.location = "./index.html";
    }, 1000);

  })

  .catch(function (erro) {

    console.log(erro);
    mostrarErro("E-mail ou senha inválidos!");

  })

  .finally(function () {
    div_aguardar.style.display = "none";
  });

}


// função de erro
function mostrarErro(msg) {
  cardErro.style.display = "block";
  mensagem_erro.innerHTML = msg;

  setTimeout(() => {
    cardErro.style.display = "none";
  }, 4000);
}

</script>
