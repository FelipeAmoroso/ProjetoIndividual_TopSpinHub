<script>


  function entrar() {

    // aguardar(); 

      var emailVar = email_input.value;
      var senhaVar = senha_input.value;

      var campos = [emailVar, senhaVar];

      for (var i = 0; i < campos.length; i++) {
        if (campos[i] == "") {
          cardErro.style.display = "block";
          mensagem_erro.innerHTML = "(Mensagem de erro para campos em branco)";
          return false;
        }
      }

      // validação de email
      if (!emailVar.includes("@") || !emailVar.includes(".")) {
        cardErro.style.display = "block";
        mensagem_erro.innerHTML = "E-mail inválido!";
        return false;
      }

      // esconde a mensagem depois de 5s
      setTimeout(sumirMensagem, 5000);

      console.log("FORM LOGIN: ", emailVar);
      console.log("FORM SENHA: ", senhaVar);


      // requisição para o servidor
      fetch("/usuarios/autenticar", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          emailServer: emailVar,
          senhaServer: senhaVar
        })
      })
        .then(function (resposta) {

          if (resposta.ok) {

            resposta.json().then(json => {

              // salvando os dados do usuário
              sessionStorage.EMAIL_USUARIO = json.email;
              sessionStorage.NOME_USUARIO = json.nome;
              sessionStorage.ID_USUARIO = json.id;

              // Redireciona para dashboard
              setTimeout(function () {
                window.location = "./dashboard/cards.html";
              }, 1000);

            });

          } else {

            cardErro.style.display = "block";
            mensagem_erro.innerHTML = "E-mail ou senha inválidos!";

            resposta.text().then(texto => {
              console.error(texto);
            });
          }

        })
        .catch(function (erro) {
          console.log(erro);
        });

      return false;
    }
  
</script>
